version: '3.8'

services:
  app:
    build: .
    container_name: nest-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_DATABASE=interview_ai
      - JWT_SECRET=your_jwt_secret_key
      - DEEPSEEK_API_KEY=sk-8d69733475874404975e548232230113
      - DEEPSEEK_API_URL=https://api.deepseek.com
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    networks:
      - nest-network

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: interview_ai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nest-network
    command: --default-authentication-plugin=mysql_native_password

networks:
  nest-network:
    driver: bridge

volumes:
  mysql_data:
